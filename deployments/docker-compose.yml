# Local development orchestration. The `api` service builds the
# image from the Dockerfile in this folder and exposes the API on
# http://localhost:8080. Environment variables are pulled from the
# shell; create a .env file alongside this one to override them.
services:
  api:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    image: template-api:dev
    container_name: template-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      APP_ENV: "development"
      LOG_LEVEL: "debug"
      CORS_ORIGINS: "*"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3
