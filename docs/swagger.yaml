    properties:
      code:
        example: not_found
        type: string
      message:
        example: resource not found
        type: string
    type: object
  github_com_yourorg_template-api_internal_models.CreateTaskInput:
    properties:
      description:
        example: Whole milk, 2L
        type: string
      title:
        example: Buy milk
        type: string
    type: object
  github_com_yourorg_template-api_internal_models.Page:
    properties:
